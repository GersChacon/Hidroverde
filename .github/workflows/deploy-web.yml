name: Deploy Hidroverde WEB to Azure

env:
  AZURE_WEBAPP_NAME: HidroverdeDigitalWEB
  NODE_VERSION: '20'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Backend/Hidroverde.WEB/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Backend/Hidroverde.WEB/HidroverdeDigital/package-lock.json

      - name: Install dependencies
        run: |
          cd "Backend/Hidroverde.WEB/HidroverdeDigital"
          npm ci

      - name: Build React app
        run: |
          cd "Backend/Hidroverde.WEB/HidroverdeDigital"
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hidroverde-web
          path: Backend/Hidroverde.WEB/HidroverdeDigital/dist

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hidroverde-web

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
