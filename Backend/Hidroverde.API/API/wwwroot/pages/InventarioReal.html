<section class="page">

    <!-- Cabecera -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Inventario · Lotes</h1>
            <p class="page-subtitle">Stock actual y movimientos por lote</p>
        </div>
        <div class="page-actions">
            <button class="btn" id="btnRefrescarInventario">Refrescar</button>
        </div>
    </div>

    <!-- KPIs -->
    <div class="inv-kpis">
        <div class="inv-kpi">
            <div class="inv-kpi__label">Lotes</div>
            <div class="inv-kpi__value" id="kpiItems">—</div>
        </div>
        <div class="inv-kpi">
            <div class="inv-kpi__label">Unidades totales</div>
            <div class="inv-kpi__value" id="kpiUnits">—</div>
        </div>
        <div class="inv-kpi inv-kpi--danger">
            <div class="inv-kpi__label">Vencidos</div>
            <div class="inv-kpi__value" id="kpiExpired">—</div>
        </div>
        <div class="inv-kpi inv-kpi--warn">
            <div class="inv-kpi__label">Por vencer (7d)</div>
            <div class="inv-kpi__value" id="kpiSoon">—</div>
        </div>
        <div class="inv-kpi inv-kpi--muted">
            <div class="inv-kpi__label">Sin stock</div>
            <div class="inv-kpi__value" id="kpiZero">—</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="content-card" style="margin-bottom:12px;">
        <div class="filter-bar">
            <label class="field" style="max-width:260px;">
                <span>Buscar producto</span>
                <input type="text" id="filtroNombre" placeholder="Nombre o código...">
            </label>
            <label class="field" style="max-width:200px;">
                <span>Lote</span>
                <input type="text" id="filtroLote" placeholder="Ej: LEC-001-...">
            </label>
            <label class="field" style="max-width:160px;">
                <span>Disponibilidad</span>
                <select id="filtroDisponibles">
                    <option value="false">Todos</option>
                    <option value="true" selected>Solo con stock</option>
                </select>
            </label>
            <label class="field" style="max-width:160px;">
                <span>Caducidad</span>
                <select id="filtroCaducidad">
                    <option value="">Todas</option>
                    <option value="vencido">Vencidos</option>
                    <option value="pronto">Por vencer (7d)</option>
                    <option value="ok">Vigentes</option>
                </select>
            </label>
            <button class="btn btn-sm" id="btnLimpiarFiltros" style="align-self:flex-end;margin-bottom:2px;">Limpiar</button>
        </div>
    </div>

    <!-- Tabla -->
    <div class="content-card">
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#Inv.</th>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Lote</th>
                        <th class="col-right">Disponible</th>
                        <th>Entrada</th>
                        <th>Caducidad</th>
                        <th>Notas</th>
                        <th class="col-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="invTbody">
                    <tr><td colspan="9" class="table-empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL — Movimientos del lote -->
    <div class="modal" id="modalMovimientos" hidden aria-hidden="true">
        <div class="modal__backdrop" id="backdropMovimientos"></div>
        <div class="modal__content modal__content--wide">
            <div class="modal__header">
                <h2 class="modalTitle" id="movimientosTitle">Movimientos</h2>
                <button class="icon-btn" id="btnCerrarMovimientos">✕</button>
            </div>
            <div class="modal__body" id="movimientosBody">
                <div class="table-empty">Cargando...</div>
            </div>
            <div class="modal__footer">
                <button class="btn" id="btnCerrarMovimientosFooter">Cerrar</button>
            </div>
        </div>
    </div>

</section>
