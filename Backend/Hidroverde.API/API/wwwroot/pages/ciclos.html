<section class="page page-ciclos">
    <header class="ciclosHeader">
        <div>
            <h1 class="ciclosTitle">Ciclos Activos</h1>
            <p class="ciclosSubtitle">Gestiona los ciclos de cultivo en curso</p>
        </div>

        <div class="ciclosHeaderActions">
            <button class="btn btn-primary" id="btnNuevaSiembra">+ Nueva siembra</button>
            <button class="btn" id="btnRefrescarCiclos">Refrescar</button>
        </div>
    </header>

    <div class="ciclosToolbar">
        <div class="searchBox">
            <span class="searchIcon">🔎</span>
            <input id="txtBuscarCiclos" type="search" placeholder="Buscar ciclos..." />
        </div>
    </div>

    <div class="ciclosCard">
        <table class="ciclosTable" id="tblCiclos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Cultivo</th>
                    <th>Inicio</th>
                    <th>Fin Estimado</th>
                    <th>Progreso</th>
                    <th>Estado</th>
                    <th class="thRight">Acciones</th>
                </tr>
            </thead>
            <tbody id="tblCiclosBody">
                <tr><td colspan="7" class="muted">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Modal Nueva Siembra (igual que el tuyo, solo asegúrate que esté hidden) -->
    <div class="modal" id="modalSiembra" hidden aria-hidden="true">
        <div class="modal__backdrop" data-close="modalSiembra"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2>Nueva siembra</h2>
                <button class="icon-btn" data-close="modalSiembra">✕</button>
            </div>

            <div class="modal__body">
                <form id="frmSiembra">
                    <div class="grid">
                        <label class="field">
                            <span>ProductoId *</span>
                            <input type="number" id="productoId" min="1" required />
                        </label>

                        <label class="field">
                            <span>VariedadId *</span>
                            <input type="number" id="variedadId" min="1" required />
                        </label>

                        <label class="field">
                            <span>TorreId *</span>
                            <input type="number" id="torreId" min="1" required />
                        </label>

                        <label class="field">
                            <span>EstadoCicloCodigo *</span>
                            <input type="text" id="estadoCicloCodigo" value="SIEMBRA" required />
                        </label>

                        <label class="field">
                            <span>Fecha siembra *</span>
                            <input type="date" id="fechaSiembra" required />
                        </label>

                        <label class="field">
                            <span>Fecha cosecha estimada *</span>
                            <input type="date" id="fechaCosechaEstimada" required />
                        </label>

                        <label class="field">
                            <span>Cantidad plantas *</span>
                            <input type="number" id="cantidadPlantas" min="1" required />
                        </label>

                        <label class="field">
                            <span>Lote semilla</span>
                            <input type="text" id="loteSemilla" />
                        </label>

                        <label class="field field--full">
                            <span>Notas</span>
                            <textarea id="notas" rows="3"></textarea>
                        </label>
                    </div>

                    <div class="modal__footer">
                        <button type="button" class="btn" data-close="modalSiembra">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
