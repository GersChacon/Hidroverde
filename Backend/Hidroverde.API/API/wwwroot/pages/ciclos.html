<section class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">Ciclos Activos</h1>
            <p class="page-subtitle">Gestiona los ciclos de cultivo en curso</p>
        </div>
        <div class="page-actions">
            <button class="btn primary" id="btnNuevaSiembra">+ Nueva siembra</button>
            <button class="btn" id="btnRefrescarCiclos">Refrescar</button>
        </div>
    </div>

    <div class="ciclos-toolbar" style="margin-bottom:14px;">
        <div class="search-box">
            <span>🔎</span>
            <input id="txtBuscarCiclos" type="search" placeholder="Buscar ciclos..." />
        </div>
    </div>

    <div class="content-card">
        <div class="table-wrap">
            <table class="data-table" id="tblCiclos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cultivo</th>
                        <th>Inicio</th>
                        <th>Fin Estimado</th>
                        <th>Progreso</th>
                        <th>Estado</th>
                        <th class="col-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tblCiclosBody">
                    <tr><td colspan="7" class="table-empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Nueva Siembra -->
    <div class="modal" id="modalSiembra" hidden aria-hidden="true">
        <div class="modal__backdrop" data-close="modalSiembra"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2>Nueva siembra</h2>
                <button class="icon-btn" data-close="modalSiembra">✕</button>
            </div>
            <div class="modal__body">
                <form id="frmSiembra">
                    <div class="grid">
                        <label class="field">
                            <span>Producto *</span>
                            <input type="number" id="productoId" min="1" required />
                        </label>
                        <label class="field">
                            <span>Variedad *</span>
                            <input type="number" id="variedadId" min="1" required />
                        </label>
                        <label class="field">
                            <span>Torre *</span>
                            <input type="number" id="torreId" min="1" required />
                        </label>
                        <label class="field">
                            <span>Estado ciclo *</span>
                            <input type="text" id="estadoCicloCodigo" value="SIEMBRA" required />
                        </label>
                        <label class="field">
                            <span>Fecha siembra *</span>
                            <input type="date" id="fechaSiembra" required />
                        </label>
                        <label class="field">
                            <span>Fecha cosecha estimada *</span>
                            <input type="date" id="fechaCosechaEstimada" required />
                        </label>
                        <label class="field">
                            <span>Cantidad plantas *</span>
                            <input type="number" id="cantidadPlantas" min="1" required />
                        </label>
                        <label class="field">
                            <span>Lote semilla</span>
                            <input type="text" id="loteSemilla" />
                        </label>
                        <label class="field field--full">
                            <span>Notas</span>
                            <textarea id="notas" rows="3"></textarea>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal__footer">
                <button type="button" class="btn" data-close="modalSiembra">Cancelar</button>
                <button type="submit" form="frmSiembra" class="btn primary">Guardar</button>
            </div>
        </div>
    </div>

</section>
