<div class="grid2" style="margin-top:12px;">
    <label style="grid-column:1/-1;">
        Nombre producto
        <input id="pNombreProducto" placeholder="Ej: Lechuga Romana" />
    </label>
    <label>
        Variedad
        <select id="pVariedadId">
            <option value="">Cargando...</option>
        </select>
    </label>
    <label>
        Unidad de medida
        <select id="pUnidadId">
            <option value="1">Unidad (u)</option>
            <option value="2">Racimo (rac)</option>
            <option value="3">Bandeja (bdj)</option>
            <option value="4">Kilogramo (kg)</option>
            <option value="5">Gramo (g)</option>
            <option value="6">Paquete (paq)</option>
            <option value="7">Atado (atd)</option>
        </select>
    </label>
    <label>
        Precio base
        <input id="pPrecioBase" type="number" step="0.01" placeholder="Ej: 1000.00" />
    </label>
    <label>
        Días caducidad
        <input id="pDiasCaducidad" type="number" placeholder="Ej: 10" />
    </label>
    <label>
        Stock mínimo
        <input id="pStockMinimo" type="number" placeholder="Ej: 15" />
    </label>
    <label>
        Requiere refrigeración
        <select id="pRequiereRefrigeracion">
            <option value="false">No</option>
            <option value="true">Sí</option>
        </select>
    </label>
    <label>
        Activo
        <select id="pActivo">
            <option value="true">Sí</option>
            <option value="false">No</option>
        </select>
    </label>
    <label style="grid-column:1/-1;">
        Descripción (opcional)
        <input id="pDescripcion" placeholder="Opcional" />
    </label>
    <label style="grid-column:1/-1;">
        ImagenUrl (opcional)
        <input id="pImagenUrl" placeholder="/assets/img/..." />
    </label>
</div>
